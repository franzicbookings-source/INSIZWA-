<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insizwa Nobunsizwa | Cultural Restoration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,100;9..144,400;9..144,900&family=Outfit:wght@200;300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4A2C2A;
            --accent: #D4AF37;
            --bone: #F5E6D3;
            --obsidian: #1A0F0E;
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #fcfbf7;
            color: var(--primary);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        html {
            scroll-behavior: smooth;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Fraunces', serif;
        }

        .zulu-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l30 30-30 30L0 30z' fill='%23d4af37' fill-opacity='0.1' fill-rule='evenodd'/%3E%3C/svg%3E");
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* --- PROFESSIONAL ANIMATIONS --- */
        
        /* Base properties for all reveal animations */
        .reveal, .reveal-left, .reveal-right, .reveal-up, .reveal-scale, .reveal-blur, .reveal-rotate {
            opacity: 0;
            will-change: transform, opacity, filter;
            transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1); /* "Expo Ease Out" for premium snap feel */
        }

        /* Standard Fade Up */
        .reveal {
            transform: translateY(40px);
            filter: blur(5px);
        }

        /* Directional Reveals */
        .reveal-left {
            transform: translateX(-50px);
            filter: blur(5px);
        }

        .reveal-right {
            transform: translateX(50px);
            filter: blur(5px);
        }

        /* Deep Upward Reveal */
        .reveal-up {
            transform: translateY(80px);
            filter: blur(0px);
        }

        /* Scale In (Good for cards/images) */
        .reveal-scale {
            transform: scale(0.9) translateY(20px);
            filter: blur(5px);
        }

        /* 3D Rotation Reveal (Good for pillars/hero elements) */
        .reveal-rotate {
            transform: perspective(1000px) rotateX(10deg) translateY(40px);
            opacity: 0;
        }

        /* Heavy Blur Reveal (Good for backgrounds/text) */
        .reveal-blur {
            filter: blur(20px);
            transform: scale(1.05);
            opacity: 0;
        }

        /* ACTIVE STATE */
        .reveal-visible {
            opacity: 1 !important;
            transform: translate(0) scale(1) rotate(0) !important;
            filter: blur(0) !important;
        }

        /* Stagger Delays */
        .delay-100 { transition-delay: 100ms; }
        .delay-200 { transition-delay: 200ms; }
        .delay-300 { transition-delay: 300ms; }
        .delay-400 { transition-delay: 400ms; }
        .delay-500 { transition-delay: 500ms; }
        .delay-700 { transition-delay: 700ms; }
    </style>
<script type="importmap">
{

    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
